<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users </title>
</head>
<body>

    <h1>All Users</h1>
    <p>Total number of users registered: {{ users|length }} </p>

    <table border = 1>
        <tr>
            <th>User ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email Address</th>
            <th>Actions</th>
        </tr>
    
        {% for member in users %}
            <tr>
                <td>{{ member.id }} </td>
                <td>{{ member.first_name }}</td>
                <td>{{ member.last_name }}</td>
                <td>{{ member.email }}</td>
                <td> 
                    <a href="{{ url_for('admin.blacklist_user', user_id=member.id) }}">Blacklist</a> 
            </tr>
        {% endfor %}
    </table>


</body>
</html>
