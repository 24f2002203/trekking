<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Login Form
    </title>
</head>
<body>
    <h1>Login</h1>

    <form method="POST">
        {{ form.hidden_tag() }}

        <p>
            {{ form.email.label }} 
            {{ form.email(size=32) }} 
        </p>

        <p>
            {{ form.password.label }} 
            {{ form.password(size=32) }} 
        </p>

        <p>
            {{ form.submit() }}
        </p>
    </form>

    <p><a href="{{ url_for('authentication.register', role='user') }}">Register as a user</a></p>
    <p><a href="{{ url_for('authentication.register', role='staff') }}">Register as a staff member</a></p>
    <p><a href="{{ url_for('home.index') }}">Go back to Home</a></p>
</body>
</html>
